loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

  storage_config:
    filesystem:
      directory: /var/loki/chunks

  ruler:
    enable_api: true
    storage:
      type: local
      local:
        directory: /var/loki/rules

singleBinary:
  replicas: 1

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

deploymentMode: SingleBinary

gateway:
  enabled: true

chunksCache:
  enabled: false

resultsCache:
  enabled: false

minio:
  enabled: false

test:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
